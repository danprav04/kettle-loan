name: Create and Store Database Backup

on:
  schedule:
    - cron: '15 20 * * *' # Runs at 20:15 UTC (23:15 local time) every day, which is two hours after the current time of 21:15.
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backup-database:
    name: Backup PostgreSQL Database
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve and Verify Secrets
        run: |
          if [ -z "${{ secrets.KETTLE_SSH_HOST || secrets.SSH_HOST }}" ]; then echo "Error: SSH host is not set."; exit 1; fi
          if [ -z "${{ secrets.KETTLE_SSH_USER || 'ubuntu' }}" ]; then echo "Error: SSH user is not set."; exit 1; fi
          if [ -z "${{ secrets.KETTLE_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" ]; then echo "Error: SSH private key is not set."; exit 1; fi
          
          # Resolve DB_NAME
          DB_NAME="${{ secrets.KETTLE_DB_NAME }}"
          if [ -z "$DB_NAME" ] && [ -n "${{ secrets.PROD_POSTGRES_URL }}" ]; then
            DB_NAME=$(echo "${{ secrets.PROD_POSTGRES_URL }}" | awk -F'/' '{print $NF}' | cut -d'?' -f1)
          fi
          
          if [ -z "$DB_NAME" ]; then
            echo "Error: Database name is not set (KETTLE_DB_NAME) and could not be parsed from PROD_POSTGRES_URL."
            exit 1
          fi
          
          # Make DB_NAME available to subsequent steps
          echo "RESOLVED_DB_NAME=$DB_NAME" >> $GITHUB_ENV
          echo "All necessary secrets and variables are resolved and validated."

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.KETTLE_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add the server's host key to known_hosts to avoid interactive prompts
          ssh-keyscan -H "${{ secrets.KETTLE_SSH_HOST || secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          echo "SSH key configured."

      - name: Create Database Dump
        run: |
          # set -e: Exit immediately if a command exits with a non-zero status.
          # set -o pipefail: The return value of a pipeline is the status of the last command to exit with a non-zero status.
          set -eo pipefail

          # Define the backup filename using a timestamp
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          BACKUP_FILE="db_backup_${TIMESTAMP}.sql.gz"
          
          # Make the filename available to subsequent steps via GITHUB_ENV
          echo "BACKUP_FILENAME=${BACKUP_FILE}" >> $GITHUB_ENV

          echo "Connecting to server and streaming dump using sudo and a local socket connection."
          
          # Execute pg_dump as the 'postgres' user via sudo.
          # By OMITTING the -h flag, pg_dump will default to using a Unix socket,
          # which will correctly use the 'peer' authentication your server is configured for.
          ssh ${{ secrets.KETTLE_SSH_USER || 'ubuntu' }}@${{ secrets.KETTLE_SSH_HOST || secrets.SSH_HOST }} "sudo -u postgres pg_dump --no-password -d ${RESOLVED_DB_NAME}" | gzip > ${BACKUP_FILE} || { echo "::error::Database backup command failed. The error from pg_dump is visible above. Ensure the SSH user has passwordless sudo access to the 'postgres' user."; exit 1; }
          
          # Explicitly check that the backup file is not empty.
          if [[ ! -s "${BACKUP_FILE}" ]]; then
            echo "::error::The created backup file is empty. This indicates a silent failure in pg_dump."
            exit 1
          fi

          echo "Database dump successfully created on runner and is not empty."

      - name: Upload database dump to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILENAME }}
          retention-days: 90

      - name: Clean up backup file from runner
        if: always()
        run: |
          echo "Cleaning up local backup file..."
          # The file might not exist if the previous step failed, so we use rm -f
          rm -f ${{ env.BACKUP_FILENAME }}
